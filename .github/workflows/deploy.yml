name: CD Vercel Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build & Verify Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint check
        run: npm run lint

      - name: Build TypeScript project
        run: npm run build

      - name: Run Test suite
        run: npm run test
        env:
          NODE_ENV: test

      - name: Notify Vercel Auto-Deploy
        run: echo "Code validated and ready for automatic Vercel deployment from main branch"
